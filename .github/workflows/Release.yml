name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build_and_release:
    name: "Build & Publish Release APK"
    runs-on: ubuntu-latest
    timeout-minutes: 120

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Grant execute permission to Gradle wrapper
        run: chmod +x ./gradlew

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Copy CI gradle.properties
        run: mkdir -p ~/.gradle ; cp .github/ci-gradle.properties ~/.gradle/gradle.properties

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Read version info
        id: version
        run: |
          VERSION_NAME=$(sed -n 's/.*versionName *= *"\(.*\)".*/\1/p' app/build.gradle.kts)
          VERSION_CODE=$(sed -n 's/.*versionCode *= *\([0-9]\+\).*/\1/p' app/build.gradle.kts)
          echo "version_name=${VERSION_NAME}" >> $GITHUB_OUTPUT
          echo "version_code=${VERSION_CODE}" >> $GITHUB_OUTPUT
          echo "Aegis version: ${VERSION_NAME} (${VERSION_CODE})"

      - name: Verify tag matches versionName
        run: |
          CLEAN_TAG="${GITHUB_REF_NAME#v}"
          if [ "${CLEAN_TAG}" != "${{ steps.version.outputs.version_name }}" ]; then
            echo "❌ Tag (${CLEAN_TAG}) does not match versionName (${{ steps.version.outputs.version_name }}) in build.gradle.kts"
            exit 1
          fi
          echo "✅ Tag matches versionName: ${{ steps.version.outputs.version_name }}"

      - name: Build Release APK
        run: ./gradlew :app:assembleRelease

      - name: Upload ProGuard Mapping
        uses: actions/upload-artifact@v4
        with:
          name: mapping-${{ github.ref_name }}
          path: app/build/outputs/mapping/release/mapping.txt

      - name: Sign Release APK
        uses: r0adkll/sign-android-release@v1
        id: sign_release
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: 
          alias: my-key
          keyStorePassword: "Sh@090609"
          keyPassword: "Sh@090609"
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Rename signed APK
        run: |
          mv "${{ steps.sign_release.outputs.signedReleaseFile }}" \
             app/build/outputs/apk/release/aegis-${{ github.ref_name }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: "Aegis ${{ github.ref_name }}"
          prerelease: false
          generate_release_notes: true
          files: |
            app/build/outputs/apk/release/aegis-${{ github.ref_name }}.apk
