name: Release Build

on:
  push:
    tags:
      - 'v*'
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  release:
    name: "Build & Publish Release APK"
    runs-on: ubuntu-latest
    timeout-minutes: 120

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Grant execute permission to Gradle wrapper
        run: chmod +x ./gradlew

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Copy CI gradle.properties
        run: mkdir -p ~/.gradle ; cp .github/ci-gradle.properties ~/.gradle/gradle.properties

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Read version info
        id: version
        run: |
          VERSION_NAME=$(sed -n 's/.*versionName *= *"\(.*\)".*/\1/p' app/build.gradle.kts)
          VERSION_CODE=$(sed -n 's/.*versionCode *= *\([0-9]\+\).*/\1/p' app/build.gradle.kts)
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            RELEASE_TAG="${GITHUB_REF_NAME}"
          else
            RELEASE_TAG="v${VERSION_NAME}"
          fi
          echo "version_name=${VERSION_NAME}" >> $GITHUB_OUTPUT
          echo "version_code=${VERSION_CODE}" >> $GITHUB_OUTPUT
          echo "release_tag=${RELEASE_TAG}" >> $GITHUB_OUTPUT
          echo "Aegis version: ${VERSION_NAME} (${VERSION_CODE}), release tag: ${RELEASE_TAG}"

      - name: Verify tag matches versionName
        if: github.ref_type == 'tag'
        run: |
          CLEAN_TAG="${GITHUB_REF_NAME#v}"
          if [ "${CLEAN_TAG}" != "${{ steps.version.outputs.version_name }}" ]; then
            echo "❌ Tag (${CLEAN_TAG}) does not match versionName (${{ steps.version.outputs.version_name }}) in build.gradle.kts"
            exit 1
          fi
          echo "✅ Tag matches versionName: ${{ steps.version.outputs.version_name }}"

      - name: Build & Sign Release APK
        run: ./gradlew :app:assembleRelease

      - name: Rename signed APK
        run: |
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/aegis-${{ steps.version.outputs.release_tag }}.apk

      - name: Upload ProGuard Mapping as artifact
        uses: actions/upload-artifact@v4
        with:
          name: mapping-${{ steps.version.outputs.release_tag }}
          path: app/build/outputs/mapping/release/mapping.txt
          if-no-files-found: ignore

      - name: Upload Signed Release APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aegis-Release-APK-${{ steps.version.outputs.release_tag }}
          path: app/build/outputs/apk/release/aegis-*.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.release_tag }}
          name: "Aegis ${{ steps.version.outputs.release_tag }}"
          prerelease: false
          make_latest: true
          generate_release_notes: true
          body: |
            ## Aegis ${{ steps.version.outputs.release_tag }}

            **Version:** `${{ steps.version.outputs.version_name }}` (code `${{ steps.version.outputs.version_code }}`)

            ### Installation
            1. Download `aegis-${{ steps.version.outputs.release_tag }}.apk` below
            2. Enable "Install from unknown sources" in Android settings
            3. Open the APK to install

            > ✅ This is a **signed release APK** — stable and ready for use.
          files: app/build/outputs/apk/release/aegis-${{ steps.version.outputs.release_tag }}.apk
