name: Debug Build

on:
  push:
    branches:
      - master
      - main
    paths-ignore:
      - '**.md'
  pull_request:
    branches:
      - master
      - main

concurrency:
  group: debug-${{ github.ref }}
  cancel-in-progress: true

jobs:
  debug:
    name: "Build Debug APK"
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Grant execute permission to Gradle wrapper
        run: chmod +x ./gradlew

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Copy CI gradle.properties
        run: mkdir -p ~/.gradle ; cp .github/ci-gradle.properties ~/.gradle/gradle.properties

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug

      - name: Read version info
        id: version
        run: |
          VERSION_NAME=$(sed -n 's/.*versionName *= *"\(.*\)".*/\1/p' app/build.gradle.kts)
          VERSION_CODE=$(sed -n 's/.*versionCode *= *\([0-9]\+\).*/\1/p' app/build.gradle.kts)
          echo "version_name=${VERSION_NAME}" >> $GITHUB_OUTPUT
          echo "version_code=${VERSION_CODE}" >> $GITHUB_OUTPUT

      - name: Rename Debug APK
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          mv app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/aegis-debug-${{ steps.version.outputs.version_name }}-${SHORT_SHA}.apk

      - name: Upload Debug APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aegis-Debug-APK
          path: app/build/outputs/apk/debug/aegis-debug-*.apk
          retention-days: 7

      - name: Create or update nightly pre-release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "Aegis Nightly (debug pre-release)"
          prerelease: true
          make_latest: false
          body: |
            **Automated debug build** from the latest commit on `${{ github.ref_name }}`.

            Commit: `${{ github.sha }}`
            Version: `${{ steps.version.outputs.version_name }}` (code `${{ steps.version.outputs.version_code }}`)

            > ⚠️ This is an unsigned debug APK for testing only. For a signed release APK, see the [Releases](../../releases) page.
          files: app/build/outputs/apk/debug/aegis-debug-*.apk
